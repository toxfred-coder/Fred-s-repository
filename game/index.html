<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>냥이 합치기 🐱 — 고양이 수박게임</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    background:radial-gradient(ellipse at 50% 30%,#2a1a4e 0%,#0d0820 70%);
    display:flex;align-items:center;justify-content:center;
    height:100vh;overflow:hidden;
  }
  canvas{display:block;image-rendering:pixelated}
</style>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
<script>
'use strict';
// ═══════════════════════════════════════════════════════════════
//  냥이 합치기  —  Phaser 3 + Matter.js  Suika-style cat game
// ═══════════════════════════════════════════════════════════════

const W = 960, H = 720;

// ── Container geometry ────────────────────────────────────────
const WALL  = 22;   // wall thickness
const CW    = 480;  // inner width
const CH    = 570;  // inner height
const CX    = 500;  // center x
const CT    = 100;  // container top  y
const CB    = CT + CH; // bottom y = 670
const CL    = CX - CW/2; // left  x = 260
const CR    = CX + CW/2; // right x = 740
const DANGY = CT + 60;   // danger line
const DROPY = CT + 14;   // where preview cat sits

// ── Cat level data ────────────────────────────────────────────
const CATS = [
  { name:'아기냥이',  r:25,  col:0xFFB3C8, hi:0xFFE0EC, dk:0xE07898, score:1  },
  { name:'꼬마냥이',  r:36,  col:0xFFCC88, hi:0xFFE8C0, dk:0xD89030, score:3  },
  { name:'귀여운냥이', r:49,  col:0x80DDB8, hi:0xB8F5D8, dk:0x48A878, score:6  },
  { name:'고양이',    r:63,  col:0x70C8E8, hi:0xA8E4F8, dk:0x3888B0, score:10 },
  { name:'통통냥이',  r:79,  col:0xBCA8E8, hi:0xDCCCFF, dk:0x8058C0, score:15 },
  { name:'뚱냥이',    r:96,  col:0xF8D040, hi:0xFFF290, dk:0xC89808, score:21 },
  { name:'큰냥이',    r:114, col:0xF8A060, hi:0xFFCC98, dk:0xC86028, score:28 },
  { name:'거대냥이',  r:131, col:0xFF6868, hi:0xFF9898, dk:0xC02828, score:36 },
  { name:'왕냥이',    r:147, col:0xA080D8, hi:0xCCB8FF, dk:0x6038A8, score:45 },
  { name:'황제냥이',  r:160, col:0x48C070, hi:0x88E898, dk:0x208040, score:55 },
  { name:'우주냥이',  r:173, col:0xFFD700, hi:0xFFF070, dk:0xB89000, score:66 },
];

// ══════════════════════════════════════════════════════════════
//  BOOT SCENE — generates all textures
// ══════════════════════════════════════════════════════════════
class BootScene extends Phaser.Scene {
  constructor(){ super({key:'Boot'}); }

  create(){
    CATS.forEach((c,i) => this.makeCatTex(i,c));
    this.makeParticleTex();
    this.makeStarTex();
    this.scene.start('Game');
  }

  // ── Draw one cat level to a RenderTexture ──────────────────
  makeCatTex(idx, cat){
    const r   = cat.r;
    const pad = Math.ceil(r * 0.08) + 4;
    const sz  = (r + pad) * 2;
    const cx  = sz / 2, cy = sz / 2;
    const g   = this.make.graphics({add:false});

    // ① drop shadow
    g.fillStyle(0x000000, 0.18);
    g.fillCircle(cx + 3, cy + 5, r - 1);

    // ② main body
    g.fillStyle(cat.col, 1);
    g.fillCircle(cx, cy, r);

    // ③ specular highlight (upper-left dome)
    g.fillStyle(0xFFFFFF, 0.28);
    g.fillEllipse(cx - r*0.24, cy - r*0.2, r*1.05, r*0.75);

    // ④ belly / muzzle base (lighter lower-center)
    g.fillStyle(cat.hi, 0.55);
    g.fillEllipse(cx, cy + r*0.18, r*1.15, r*0.9);

    // ⑤ level-specific body markings ───────────────────────
    if(idx === 2){ // mint stripes
      g.lineStyle(Math.max(2, r*0.055), cat.dk, 0.38);
      [-0.28, 0, 0.28].forEach(ox=>{
        g.beginPath();
        g.moveTo(cx+ox*r, cy-r*0.7);
        g.lineTo(cx+ox*r*0.8, cy+r*0.1);
        g.strokePath();
      });
    }
    if(idx === 3){ // classic tabby forehead
      g.fillStyle(cat.dk, 0.25);
      g.fillEllipse(cx-r*0.33, cy-r*0.55, r*0.22, r*0.3);
      g.fillEllipse(cx+r*0.33, cy-r*0.55, r*0.22, r*0.3);
      g.fillEllipse(cx, cy-r*0.62, r*0.18, r*0.28);
    }
    if(idx === 6){ // peach tiger stripes
      g.lineStyle(Math.max(2, r*0.06), cat.dk, 0.42);
      [-0.52,-0.22,0.22,0.52].forEach(ox=>{
        g.beginPath(); g.moveTo(cx+ox*r, cy-r*0.45); g.lineTo(cx+ox*r*0.6, cy+r*0.35); g.strokePath();
      });
    }
    if(idx === 7){ // giant cat bold stripes
      g.lineStyle(Math.max(3, r*0.075), cat.dk, 0.48);
      [-0.48,-0.16,0.16,0.48].forEach(ox=>{
        g.beginPath(); g.moveTo(cx+ox*r, cy-r*0.55); g.lineTo(cx+ox*r*0.75, cy+r*0.4); g.strokePath();
      });
    }
    if(idx === 10){ // space cat — star pattern
      g.fillStyle(0xFFFFFF, 0.55);
      [[-0.5,-0.2],[0.52,-0.15],[0,0.6],[-0.4,0.5],[0.42,0.5]].forEach(([ox,oy])=>{
        const sx=cx+ox*r, sy=cy+oy*r, sr=r*0.07;
        for(let a=0;a<5;a++){
          const ai=a*Math.PI*4/5-Math.PI/2, bi=ai+Math.PI/5;
          g.fillStyle(0xFFFFFF, 0.6);
          g.fillCircle(sx+Math.cos(ai)*sr*2, sy+Math.sin(ai)*sr*2, sr*0.7);
        }
        g.fillCircle(sx,sy,sr*1.2);
      });
    }

    // ⑥ ears ─────────────────────────────────────────────────
    const earDk = cat.dk;
    g.fillStyle(earDk, 1);
    // left ear outer
    g.fillTriangle(cx-r*0.63, cy-r*0.56,  cx-r*0.09, cy-r*0.99,  cx-r*0.07, cy-r*0.50);
    // right ear outer
    g.fillTriangle(cx+r*0.63, cy-r*0.56,  cx+r*0.09, cy-r*0.99,  cx+r*0.07, cy-r*0.50);
    // inner ears (pink)
    g.fillStyle(0xFF9EC5, 1);
    g.fillTriangle(cx-r*0.54, cy-r*0.59,  cx-r*0.13, cy-r*0.93,  cx-r*0.11, cy-r*0.53);
    g.fillTriangle(cx+r*0.54, cy-r*0.59,  cx+r*0.13, cy-r*0.93,  cx+r*0.11, cy-r*0.53);

    // ⑦ ear fur tufts (level ≥ 5)
    if(idx >= 5){
      g.fillStyle(cat.hi, 0.6);
      g.fillTriangle(cx-r*0.46, cy-r*0.66, cx-r*0.17, cy-r*0.88, cx-r*0.14, cy-r*0.6);
      g.fillTriangle(cx+r*0.46, cy-r*0.66, cx+r*0.17, cy-r*0.88, cx+r*0.14, cy-r*0.6);
    }

    // ⑧ muzzle / cheek area ───────────────────────────────────
    g.fillStyle(cat.hi, 0.82);
    g.fillEllipse(cx, cy + r*0.1, r*0.62, r*0.46);

    // ⑨ rosy cheeks
    g.fillStyle(0xFF9EC5, 0.35);
    g.fillEllipse(cx - r*0.42, cy + r*0.08, r*0.28, r*0.2);
    g.fillEllipse(cx + r*0.42, cy + r*0.08, r*0.28, r*0.2);

    // ⑩ eyes ──────────────────────────────────────────────────
    const eyeR  = Math.max(5, r * 0.135);
    const eyeY  = cy - r * 0.14;
    const eyeXO = r * 0.305;
    // whites
    g.fillStyle(0xFFFFFF, 1);
    g.fillCircle(cx - eyeXO, eyeY, eyeR * 1.28);
    g.fillCircle(cx + eyeXO, eyeY, eyeR * 1.28);
    // iris rings
    g.fillStyle(cat.dk, 0.7);
    g.fillCircle(cx - eyeXO, eyeY, eyeR * 1.08);
    g.fillCircle(cx + eyeXO, eyeY, eyeR * 1.08);
    // pupils (vertical cat slit)
    g.fillStyle(0x0D0D1A, 1);
    g.fillEllipse(cx - eyeXO, eyeY, eyeR * 0.72, eyeR * 1.98);
    g.fillEllipse(cx + eyeXO, eyeY, eyeR * 0.72, eyeR * 1.98);
    // shine dots
    g.fillStyle(0xFFFFFF, 1);
    g.fillCircle(cx - eyeXO - eyeR*0.2, eyeY - eyeR*0.42, eyeR * 0.38);
    g.fillCircle(cx + eyeXO - eyeR*0.2, eyeY - eyeR*0.42, eyeR * 0.38);

    // ⑪ nose ──────────────────────────────────────────────────
    const noseY = cy + r * 0.155;
    g.fillStyle(0xFF7FAA, 1);
    g.fillTriangle(cx-r*0.072, noseY, cx+r*0.072, noseY, cx, noseY+r*0.1);

    // ⑫ mouth ────────────────────────────────────────────────
    const mThick = Math.max(1.5, r * 0.048);
    g.lineStyle(mThick, 0xAA5577, 1);
    g.beginPath(); g.moveTo(cx, noseY+r*0.1); g.lineTo(cx-r*0.17, noseY+r*0.23); g.strokePath();
    g.beginPath(); g.moveTo(cx, noseY+r*0.1); g.lineTo(cx+r*0.17, noseY+r*0.23); g.strokePath();

    // ⑬ whiskers ──────────────────────────────────────────────
    const wL = Math.max(1, r * 0.032);
    g.lineStyle(wL, 0xCCCCCC, 0.8);
    [
      [cx-r*0.1, noseY-r*0.02, cx-r*0.82, noseY-r*0.14],
      [cx-r*0.1, noseY+r*0.05, cx-r*0.82, noseY+r*0.09],
      [cx-r*0.1, noseY+r*0.12, cx-r*0.82, noseY+r*0.28],
      [cx+r*0.1, noseY-r*0.02, cx+r*0.82, noseY-r*0.14],
      [cx+r*0.1, noseY+r*0.05, cx+r*0.82, noseY+r*0.09],
      [cx+r*0.1, noseY+r*0.12, cx+r*0.82, noseY+r*0.28],
    ].forEach(([x1,y1,x2,y2])=>{
      g.beginPath(); g.moveTo(x1,y1); g.lineTo(x2,y2); g.strokePath();
    });

    // ⑭ crown (king+ cats) ───────────────────────────────────
    if(idx >= 8){
      const cY = cy - r * 0.76;
      const cW = r * 0.68, cH = r * 0.15;
      g.fillStyle(0xFFD700, 1);
      g.fillRect(cx - cW/2, cY, cW, cH);
      g.fillTriangle(cx-cW/2,  cY, cx-cW/2+cW*0.18, cY-r*0.22, cx-cW/2+cW*0.36, cY);
      g.fillTriangle(cx-cW*0.08,cY, cx,               cY-r*0.28, cx+cW*0.08,      cY);
      g.fillTriangle(cx+cW/2,  cY, cx+cW/2-cW*0.18, cY-r*0.22, cx+cW/2-cW*0.36, cY);
      // gems
      g.fillStyle(0xFF2255, 1); g.fillCircle(cx, cY-r*0.04, r*0.07);
      if(idx >= 9){
        g.fillStyle(0x55AAFF, 1);
        g.fillCircle(cx-cW*0.22, cY-r*0.04, r*0.055);
        g.fillCircle(cx+cW*0.22, cY-r*0.04, r*0.055);
      }
      if(idx === 10){ // cosmic aura ring
        g.lineStyle(Math.max(2, r*0.07), 0xFFD700, 0.4);
        g.strokeCircle(cx, cy, r + r*0.12);
      }
    }

    // ⑮ level number badge ────────────────────────────────────
    const badgeR = Math.max(10, r * 0.22);
    g.fillStyle(0x000000, 0.5);
    g.fillCircle(cx + r*0.65, cy + r*0.65, badgeR);
    g.fillStyle(0xFFFFFF, 0.95);
    g.fillCircle(cx + r*0.65, cy + r*0.65, badgeR - 2);

    // ⑯ body outline ──────────────────────────────────────────
    g.lineStyle(Math.max(2, r*0.065), cat.dk, 0.65);
    g.strokeCircle(cx, cy, r);

    g.generateTexture('cat_'+idx, sz, sz);
    g.destroy();

    // Add level number text separately via RenderTexture
    if(idx < 10){
      const rt = this.add.renderTexture(0, 0, sz, sz).setVisible(false);
      rt.draw('cat_'+idx, 0, 0);
      const txt = this.add.text(cx + r*0.65, cy + r*0.65,
        (idx+1).toString(),
        { fontSize: Math.max(9,r*0.2)|0+'px', fontFamily:'monospace',
          color:'#333', fontStyle:'bold' }
      ).setOrigin(0.5).setVisible(false);
      rt.draw(txt, 0, 0);
      rt.saveTexture('cat_'+idx);
      txt.destroy(); rt.destroy();
    }
  }

  makeParticleTex(){
    const g = this.make.graphics({add:false});
    g.fillStyle(0xFFFFFF,1); g.fillCircle(8,8,8);
    g.generateTexture('dot',16,16); g.destroy();
  }
  makeStarTex(){
    const g = this.make.graphics({add:false});
    g.fillStyle(0xFFFF00,1);
    const pts=[];
    for(let i=0;i<5;i++){
      const a=(i*4*Math.PI/5)-Math.PI/2, b=a+Math.PI/5;
      pts.push({x:10+9*Math.cos(a),y:10+9*Math.sin(a)});
      pts.push({x:10+4*Math.cos(b),y:10+4*Math.sin(b)});
    }
    g.fillPoints(pts,true);
    g.generateTexture('star',20,20); g.destroy();
  }
}

// ══════════════════════════════════════════════════════════════
//  GAME SCENE
// ══════════════════════════════════════════════════════════════
class GameScene extends Phaser.Scene {
  constructor(){ super({key:'Game'}); }

  init(){
    this.score   = 0;
    this.best    = parseInt(localStorage.getItem('catBest')||'0');
    this.merging = new Set();
    this.cats    = [];
    this.over    = false;
    this.canDrop = false;
    this.previewLevel = 0;
    this.nextLevel    = 0;
    this.dangerSec    = 0;
    this.previewX     = CX;
    this.dropLine     = null;
    this.previewImg   = null;
    this.particles    = null;
    this.overGfx      = null;
  }

  create(){
    this.createBackground();
    this.createContainer();
    this.createUI();
    this.createParticles();
    this.setupInput();
    this.setupCollisions();
    this.scheduleNext();
  }

  // ── Background ────────────────────────────────────────────
  createBackground(){
    // gradient bg via rect
    const bg = this.add.graphics();
    const grd = { type:'linear', x:0,y:0,x2:0,y2:H,
      stops:[[0,'#1a0a3e'],[0.5,'#0d0820'],[1,'#130a28']]};
    bg.fillGradientStyle(0x1a0a3e,0x1a0a3e,0x0d0820,0x0d0820,1);
    bg.fillRect(0,0,W,H);

    // floating cat paw print decorations
    const pawCol = 0x3a1a5e;
    for(let i=0;i<12;i++){
      const px=Phaser.Math.Between(20,240), py=Phaser.Math.Between(20,H-20), ps=Phaser.Math.Between(10,25);
      const pg=this.add.graphics();
      pg.fillStyle(pawCol,0.25); pg.fillCircle(px,py,ps);
      pg.fillCircle(px-ps*0.65,py-ps*0.75,ps*0.5);
      pg.fillCircle(px+ps*0.65,py-ps*0.75,ps*0.5);
      pg.fillCircle(px-ps*1.1, py-ps*0.2,ps*0.4);
      pg.fillCircle(px+ps*1.1, py-ps*0.2,ps*0.4);
    }
    for(let i=0;i<8;i++){
      const px=Phaser.Math.Between(760,W-20), py=Phaser.Math.Between(20,H-20), ps=Phaser.Math.Between(10,22);
      const pg=this.add.graphics();
      pg.fillStyle(pawCol,0.22); pg.fillCircle(px,py,ps);
      pg.fillCircle(px-ps*0.65,py-ps*0.75,ps*0.5);
      pg.fillCircle(px+ps*0.65,py-ps*0.75,ps*0.5);
      pg.fillCircle(px-ps*1.1, py-ps*0.2,ps*0.4);
      pg.fillCircle(px+ps*1.1, py-ps*0.2,ps*0.4);
    }
  }

  // ── Container & walls ─────────────────────────────────────
  createContainer(){
    const wallOpts = { isStatic:true, friction:0.5, restitution:0.25, label:'wall' };

    // bottom wall (Matter static body)
    this.matter.add.rectangle(CX, CB + WALL/2, CW + WALL*2, WALL, wallOpts);
    // left wall
    this.matter.add.rectangle(CL - WALL/2, CY + (CH-WALL)/2, WALL, CH + WALL, wallOpts);
    // right wall
    this.matter.add.rectangle(CR + WALL/2, CY + (CH-WALL)/2, WALL, CH + WALL, wallOpts);

    // ── visual container ──
    const g = this.add.graphics();

    // outer glow
    g.lineStyle(2, 0xff69b4, 0.15); g.strokeRect(CL-WALL-4, CT-WALL-4, CW+WALL*2+8, CH+WALL*2+8);

    // walls (dark + border)
    const wallCol  = 0x2a1850;
    const wallEdge = 0x8855cc;
    g.fillStyle(wallCol, 0.95);
    g.fillRect(CL-WALL, CT-WALL, WALL, CH+WALL*2);       // left
    g.fillRect(CR, CT-WALL, WALL, CH+WALL*2);              // right
    g.fillRect(CL-WALL, CB, CW+WALL*2, WALL);              // bottom

    g.lineStyle(2, wallEdge, 0.7);
    g.strokeRect(CL-WALL, CT-WALL, WALL, CH+WALL*2);
    g.strokeRect(CR, CT-WALL, WALL, CH+WALL*2);
    g.strokeRect(CL-WALL, CB, CW+WALL*2, WALL);

    // inner glass overlay
    g.fillStyle(0x8855ff, 0.06);
    g.fillRect(CL, CT, CW, CH);

    // danger line
    g.lineStyle(1, 0xFF4444, 0.55);
    g.setLineDash([8,6]);
    g.lineBetween(CL, DANGY, CR, DANGY);
    g.setLineDash([]);
    this.add.text(CL-WALL-2, DANGY-7, '⚠', {fontSize:'13px', color:'#FF4444', alpha:0.8}).setOrigin(1,0);

    // top opening indicator
    g.lineStyle(2, 0x8855cc, 0.4);
    g.lineBetween(CL, CT, CL-WALL, CT);
    g.lineBetween(CR, CT, CR+WALL, CT);

    this.dropLineGfx = this.add.graphics();
  }

  // ── UI panels ─────────────────────────────────────────────
  createUI(){
    // ── LEFT PANEL ──
    const lx = 20, panW = 220;

    // score box
    const sb = this.add.graphics();
    sb.fillStyle(0x1e0d3a,0.92); sb.fillRoundedRect(lx,10,panW,90,12);
    sb.lineStyle(1,0xff69b4,0.5); sb.strokeRoundedRect(lx,10,panW,90,12);

    this.add.text(lx+14,22,'🐱 냥이 합치기',{fontSize:'13px',fontFamily:'monospace',color:'#cc88ff'});
    this.add.text(lx+14,42,'SCORE',{fontSize:'11px',fontFamily:'monospace',color:'#aaaaaa'});
    this.scoreText = this.add.text(lx+14,56,'0',{fontSize:'28px',fontFamily:'monospace',color:'#ffffff',fontStyle:'bold'});
    this.add.text(lx+14,88,'BEST',{fontSize:'10px',fontFamily:'monospace',color:'#888888'});
    this.bestText  = this.add.text(lx+90,88,this.best.toString(),{fontSize:'10px',fontFamily:'monospace',color:'#cccccc'});

    // next cat box
    const nb = this.add.graphics();
    nb.fillStyle(0x1e0d3a,0.92); nb.fillRoundedRect(lx,110,panW,140,12);
    nb.lineStyle(1,0xff69b4,0.5); nb.strokeRoundedRect(lx,110,panW,140,12);
    this.add.text(lx+panW/2,124,'NEXT',{fontSize:'12px',fontFamily:'monospace',color:'#cc88ff'}).setOrigin(0.5,0);
    this.nextCatImg = this.add.image(lx+panW/2, 195, 'cat_0').setScale(0.7);
    this.nextNameTxt= this.add.text(lx+panW/2,238,'아기냥이',{fontSize:'11px',fontFamily:'monospace',color:'#dddddd'}).setOrigin(0.5,0);

    // cat catalog
    const cb2 = this.add.graphics();
    cb2.fillStyle(0x1e0d3a,0.9); cb2.fillRoundedRect(lx,260,panW,440,12);
    cb2.lineStyle(1,0x553377,0.5); cb2.strokeRoundedRect(lx,260,panW,440,12);
    this.add.text(lx+panW/2,272,'고양이 도감',{fontSize:'11px',fontFamily:'monospace',color:'#cc88ff'}).setOrigin(0.5,0);

    const colCount = 3;
    const cellW = panW / colCount;
    CATS.forEach((cat, i)=>{
      const col = i % colCount, row = Math.floor(i / colCount);
      const tx = lx + col*cellW + cellW/2;
      const ty = 295 + row*70 + 20;
      const sc = Math.min(1, 35/cat.r);
      this.add.image(tx, ty, 'cat_'+i).setScale(sc).setAlpha(0.75);
      this.add.text(tx, ty+28, cat.name, {fontSize:'8px',fontFamily:'monospace',color:'#aaaaaa'}).setOrigin(0.5,0);
      this.add.text(tx, ty+38, cat.score+'pts', {fontSize:'7px',fontFamily:'monospace',color:'#888888'}).setOrigin(0.5,0);
    });

    // ── RIGHT PANEL — instructions ──
    const rx = CR + WALL + 14;
    const rg = this.add.graphics();
    rg.fillStyle(0x1e0d3a,0.92); rg.fillRoundedRect(rx,10,160,200,12);
    rg.lineStyle(1,0xff69b4,0.5); rg.strokeRoundedRect(rx,10,160,200,12);
    this.add.text(rx+80,22,'조작법',{fontSize:'12px',fontFamily:'monospace',color:'#cc88ff'}).setOrigin(0.5,0);
    [
      '🖱️ 마우스 이동',
      '   위치 조준',
      '',
      '🖱️ 클릭으로',
      '   고양이 드롭',
      '',
      '📱 터치도 OK!',
      '',
      '같은 냥이끼리',
      '합치면 업그레이드!',
      '',
      '⚠️ 빨간선 넘으면',
      '   게임 오버!',
    ].forEach((line,i)=>{
      this.add.text(rx+14, 40+i*12, line, {fontSize:'10px',fontFamily:'monospace',color:'#aaaaaa'});
    });

    // score tally table
    const rg2 = this.add.graphics();
    rg2.fillStyle(0x1e0d3a,0.9); rg2.fillRoundedRect(rx,220,160,H-230,12);
    rg2.lineStyle(1,0x553377,0.5); rg2.strokeRoundedRect(rx,220,160,H-230,12);
    this.add.text(rx+80,232,'합치기 점수',{fontSize:'10px',fontFamily:'monospace',color:'#cc88ff'}).setOrigin(0.5,0);
    CATS.forEach((cat,i)=>{
      const ty = 250 + i*37;
      const sc = Math.min(1, 22/cat.r);
      this.add.image(rx+24, ty+10, 'cat_'+i).setScale(sc).setAlpha(0.8);
      this.add.text(rx+44, ty+2,  cat.name,          {fontSize:'8px',fontFamily:'monospace',color:'#cccccc'});
      this.add.text(rx+44, ty+13, '+'+cat.score*10+'점', {fontSize:'9px',fontFamily:'monospace',color:'#f1c40f'});
      if(i < CATS.length-1){
        const ny = ty+37;
        this.add.text(rx+80, ny-12, '↓', {fontSize:'9px',fontFamily:'monospace',color:'#555'}).setOrigin(0.5);
      }
    });
  }

  // ── Particle emitter ──────────────────────────────────────
  createParticles(){
    this.particles = this.add.particles(0,0,'dot',{
      speed:{min:60,max:220},
      scale:{start:0.5,end:0},
      alpha:{start:1,end:0},
      lifespan:{min:300,max:700},
      quantity:0,
      emitting:false,
    });
    this.starParticles = this.add.particles(0,0,'star',{
      speed:{min:50,max:180},
      scale:{start:0.6,end:0},
      alpha:{start:1,end:0},
      lifespan:{min:400,max:900},
      rotate:{start:0,end:360},
      quantity:0,
      emitting:false,
    });
  }

  // ── Input ─────────────────────────────────────────────────
  setupInput(){
    this.input.on('pointermove', ptr=>{
      if(this.over) return;
      const newX = Phaser.Math.Clamp(ptr.x, CL+2, CR-2);
      this.previewX = newX;
      if(this.previewImg) this.previewImg.x = newX;
    });
    this.input.on('pointerdown', ptr=>{
      if(this.over){ this.restartGame(); return; }
      if(!this.canDrop) return;
      this.dropCat(this.previewX);
    });
  }

  // ── Matter collision handling ────────────────────────────
  setupCollisions(){
    this.matter.world.on('collisionstart', event=>{
      event.pairs.forEach(({bodyA, bodyB})=>{
        const gA = bodyA.gameObject, gB = bodyB.gameObject;
        if(!gA || !gB) return;
        const lvA = gA.getData ? gA.getData('catLevel') : undefined;
        const lvB = gB.getData ? gB.getData('catLevel') : undefined;
        if(lvA === undefined || lvB === undefined) return;
        if(lvA !== lvB || lvA >= CATS.length-1) return;
        if(this.merging.has(gA) || this.merging.has(gB)) return;

        this.merging.add(gA); this.merging.add(gB);
        this.time.delayedCall(80, ()=> this.mergeCats(gA, gB, lvA));
      });
    });
  }

  // ── Spawn next preview cat ────────────────────────────────
  scheduleNext(){
    this.nextLevel = Phaser.Math.Between(0, Math.min(4, Math.floor(this.score/200)));
    this.updateNextUI();
    this.time.delayedCall(300, ()=> this.spawnPreview());
  }

  spawnPreview(){
    if(this.over) return;
    if(this.previewImg){ this.previewImg.destroy(); this.previewImg=null; }
    this.previewLevel = this.nextLevel;
    const r = CATS[this.previewLevel].r;
    this.previewImg = this.add.image(this.previewX, DROPY - 4, 'cat_'+this.previewLevel)
      .setAlpha(0.72).setDepth(5);
    this.canDrop = true;

    // Animate in
    this.tweens.add({ targets:this.previewImg, scaleX:{from:0.3,to:1}, scaleY:{from:0.3,to:1},
      ease:'Back.Out', duration:220 });
  }

  updateNextUI(){
    if(!this.nextCatImg) return;
    this.nextCatImg.setTexture('cat_'+this.nextLevel);
    const sc = Math.min(0.9, 60/CATS[this.nextLevel].r);
    this.nextCatImg.setScale(sc);
    this.nextNameTxt.setText(CATS[this.nextLevel].name);
  }

  // ── Drop a cat ───────────────────────────────────────────
  dropCat(x){
    if(!this.canDrop || this.over) return;
    this.canDrop = false;

    const lv  = this.previewLevel;
    const cat = this.createCat(x, DROPY, lv);
    // gentle nudge so it falls naturally
    cat.setVelocity(Phaser.Math.FloatBetween(-0.3,0.3), 1);

    if(this.previewImg){ this.previewImg.destroy(); this.previewImg=null; }

    // next cat after delay
    this.time.delayedCall(600, ()=> this.scheduleNext());
  }

  // ── Create a physics cat ──────────────────────────────────
  createCat(x, y, level){
    const cat_data = CATS[level];
    const r = cat_data.r;

    const cat = this.matter.add.image(x, y, 'cat_'+level, null, {
      shape    : { type:'circle', radius:r },
      restitution : 0.22,
      friction    : 0.55,
      frictionAir : 0.006,
      density     : 0.0012 * (level + 1),
      label       : 'cat',
    });
    cat.setData('catLevel', level);
    cat.setData('spawnTime', this.time.now);
    cat.setDepth(3);
    this.cats.push(cat);
    return cat;
  }

  // ── Merge two same-level cats ─────────────────────────────
  mergeCats(catA, catB, level){
    if(!catA.active || !catB.active){ this.merging.delete(catA); this.merging.delete(catB); return; }
    const mx = (catA.x + catB.x) / 2;
    const my = (catA.y + catB.y) / 2;

    // Score
    const pts = CATS[level+1].score * 10;
    this.score += pts;
    this.scoreText.setText(this.score.toString());
    this.showFloatScore(mx, my-20, '+'+pts);

    // Particles
    const col = CATS[level].col;
    const r = Phaser.Display.Color.IntegerToColor(col);
    this.particles.setTint(col);
    this.particles.emitParticleAt(mx, my, 14);
    this.starParticles.setTint(col);
    this.starParticles.emitParticleAt(mx, my, 7);

    // Destroy old cats
    this.cats = this.cats.filter(c=>c!==catA && c!==catB);
    catA.destroy(); catB.destroy();
    this.merging.delete(catA); this.merging.delete(catB);

    // Create new upgraded cat
    const newCat = this.createCat(mx, my, level+1);
    newCat.setVelocity(0, -4);

    // Scale-pop tween (visual feedback)
    this.tweens.add({ targets:newCat, scaleX:{from:1.35,to:1}, scaleY:{from:1.35,to:1},
      ease:'Back.Out', duration:280 });

    // Camera shake
    this.cameras.main.shake(90, 0.007 * (level+1));

    // Best score update
    if(this.score > this.best){
      this.best = this.score;
      localStorage.setItem('catBest', this.best);
      this.bestText.setText(this.best.toString());
    }
  }

  showFloatScore(x, y, msg){
    const t = this.add.text(x, y, msg,
      {fontSize:'18px',fontFamily:'monospace',color:'#f1c40f',fontStyle:'bold',
       stroke:'#000',strokeThickness:3}).setOrigin(0.5).setDepth(10);
    this.tweens.add({targets:t, y:y-60, alpha:0, duration:800,
      onComplete:()=>t.destroy()});
  }

  // ── Update (per frame) ────────────────────────────────────
  update(time, delta){
    if(this.over) return;
    const dt = delta / 1000;

    // Draw drop guide line
    this.dropLineGfx.clear();
    if(this.previewImg && this.canDrop){
      const px = this.previewX;
      this.dropLineGfx.lineStyle(1, 0xFFFFFF, 0.18);
      this.dropLineGfx.setLineDash([6,8]);
      this.dropLineGfx.lineBetween(px, DROPY + CATS[this.previewLevel].r + 2, px, CB);
      this.dropLineGfx.setLineDash([]);
      // aim circle at preview
      this.dropLineGfx.lineStyle(1, 0xFFFFFF, 0.22);
      this.dropLineGfx.strokeCircle(px, DROPY, CATS[this.previewLevel].r);
    }

    // Game-over check: cat above danger line (after settling time)
    const now = this.time.now;
    const overflowing = this.cats.some(c =>
      c.active && c.y - CATS[c.getData('catLevel')].r < DANGY &&
      now - c.getData('spawnTime') > 1800
    );

    if(overflowing){
      this.dangerSec += dt;
      if(this.dangerSec >= 2.8) this.triggerGameOver();
    } else {
      this.dangerSec = 0;
    }

    // Clean up off-screen cats (fell through somehow)
    this.cats = this.cats.filter(c=>{
      if(c.active && c.y > CB + 200){ c.destroy(); return false; }
      return c.active;
    });
  }

  triggerGameOver(){
    this.over = true;
    this.canDrop = false;
    if(this.previewImg){ this.previewImg.destroy(); this.previewImg=null; }

    // Flash effect
    this.cameras.main.flash(600, 255, 50, 50);
    this.cameras.main.shake(400, 0.02);

    this.time.delayedCall(800, ()=>{
      this.scene.start('GameOver', { score:this.score, best:this.best });
    });
  }

  restartGame(){
    this.scene.start('Game');
  }
}

// ══════════════════════════════════════════════════════════════
//  GAME OVER SCENE
// ══════════════════════════════════════════════════════════════
class GameOverScene extends Phaser.Scene {
  constructor(){ super({key:'GameOver'}); }

  init(d){ this.finalScore=d.score||0; this.bestScore=d.best||0; }

  create(){
    // dark bg
    this.add.rectangle(W/2,H/2,W,H,0x000000,0.75);

    // Panel
    const g=this.add.graphics();
    g.fillStyle(0x1e0d3a,0.97); g.fillRoundedRect(W/2-180,H/2-220,360,440,20);
    g.lineStyle(2,0xff69b4,0.8); g.strokeRoundedRect(W/2-180,H/2-220,360,440,20);

    // Cat face display
    const bestLv = Math.min(CATS.length-1, Math.floor(Math.sqrt(this.finalScore/10)));
    this.add.image(W/2, H/2-130, 'cat_'+bestLv).setScale(Math.min(1.2, 90/CATS[bestLv].r));

    this.add.text(W/2,H/2-30,'GAME OVER',
      {fontSize:'32px',fontFamily:'monospace',color:'#ff69b4',fontStyle:'bold',
       stroke:'#000',strokeThickness:4}).setOrigin(0.5);

    this.add.text(W/2,H/2+20,'SCORE',
      {fontSize:'14px',fontFamily:'monospace',color:'#aaaaaa'}).setOrigin(0.5);
    this.add.text(W/2,H/2+44,this.finalScore.toLocaleString(),
      {fontSize:'36px',fontFamily:'monospace',color:'#ffffff',fontStyle:'bold'}).setOrigin(0.5);

    this.add.text(W/2,H/2+90,'BEST: '+this.bestScore.toLocaleString(),
      {fontSize:'16px',fontFamily:'monospace',color:'#f1c40f'}).setOrigin(0.5);

    // Restart button
    const btn=this.add.graphics();
    btn.fillStyle(0x8833cc,1); btn.fillRoundedRect(W/2-100,H/2+140,200,52,12);
    btn.lineStyle(2,0xff69b4,1); btn.strokeRoundedRect(W/2-100,H/2+140,200,52,12);
    const btnTxt=this.add.text(W/2,H/2+166,'다시 시작 🐱',
      {fontSize:'16px',fontFamily:'monospace',color:'#fff',fontStyle:'bold'}).setOrigin(0.5);
    const zone=this.add.zone(W/2,H/2+166,200,52).setInteractive();
    zone.on('pointerdown',()=>this.scene.start('Game'));
    zone.on('pointerover',()=>{ btn.clear();
      btn.fillStyle(0xaa55ff,1); btn.fillRoundedRect(W/2-100,H/2+140,200,52,12);
      btn.lineStyle(2,0xff69b4,1); btn.strokeRoundedRect(W/2-100,H/2+140,200,52,12); });
    zone.on('pointerout',()=>{ btn.clear();
      btn.fillStyle(0x8833cc,1); btn.fillRoundedRect(W/2-100,H/2+140,200,52,12);
      btn.lineStyle(2,0xff69b4,1); btn.strokeRoundedRect(W/2-100,H/2+140,200,52,12); });

    // also keyboard
    this.input.keyboard.once('keydown', ()=>this.scene.start('Game'));

    // confetti
    for(let i=0;i<50;i++){
      const cx=Phaser.Math.Between(0,W), cy=Phaser.Math.Between(-50,0);
      const col=[0xff69b4,0xf1c40f,0x2ecc71,0x3498db,0xe74c3c][i%5];
      const r=this.add.rectangle(cx,cy,10,10,col).setAngle(Phaser.Math.Between(0,360));
      this.tweens.add({targets:r, y:H+60, angle:r.angle+Phaser.Math.Between(180,540),
        x:cx+Phaser.Math.Between(-100,100), duration:Phaser.Math.Between(2000,4000),
        delay:Phaser.Math.Between(0,1500), repeat:-1,
        onRepeat:()=>{ r.x=Phaser.Math.Between(0,W); r.y=-50; }});
    }
  }
}

// ══════════════════════════════════════════════════════════════
//  PHASER CONFIG
// ══════════════════════════════════════════════════════════════
new Phaser.Game({
  type        : Phaser.AUTO,
  width       : W,
  height      : H,
  backgroundColor: '#0d0820',
  physics: {
    default : 'matter',
    matter  : {
      gravity     : { y:2.2 },
      debug       : false,
      positionIterations : 10,
      velocityIterations : 10,
      constraintIterations: 4,
    },
  },
  scene : [BootScene, GameScene, GameOverScene],
  scale : {
    mode        : Phaser.Scale.FIT,
    autoCenter  : Phaser.Scale.CENTER_BOTH,
    width       : W,
    height      : H,
  },
});
</script>
